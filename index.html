<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missão mhGAP — O Jogo Completo</title>
<style>
  :root{
    --navy:#0d2c54; --navy2:#123a6d; --blue:#1d5ba6; --lightblue:#e8f0fa;
    --green:#1e8a4c; --greenbg:#e5f5ec; --red:#c62828; --redbg:#fdeaea;
    --amber:#e6a817; --ink:#1c2733; --gray:#5c6b7a; --card:#ffffff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Segoe UI', system-ui, -apple-system, Arial, sans-serif; background:linear-gradient(160deg,#0d2c54 0%,#123a6d 60%,#1d5ba6 100%); min-height:100vh; color:var(--ink);}
  #app{max-width:880px; margin:0 auto; padding:16px;}
  .topbar{display:flex; align-items:center; gap:14px; color:#fff; padding:10px 4px; flex-wrap:wrap;}
  .topbar h1{font-size:1.05rem; font-weight:600; letter-spacing:.3px; flex:1; min-width:220px;}
  .meter-wrap{display:flex; align-items:center; gap:8px; font-size:.8rem;}
  .meter{width:150px; height:14px; background:rgba(255,255,255,.25); border-radius:8px; overflow:hidden;}
  .meter-fill{height:100%; width:100%; background:linear-gradient(90deg,#e6a817,#3ecf6f); transition:width .5s;}
  .pill{background:rgba(255,255,255,.15); border-radius:20px; padding:4px 12px; font-size:.8rem;}
  .pill.combo{background:#ff8f00; font-weight:700; animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
  .card{background:var(--card); border-radius:16px; padding:28px; box-shadow:0 8px 30px rgba(0,0,0,.25); margin-top:12px; animation:fadeIn .4s; position:relative; overflow:hidden;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
  .shake{animation:shake .3s;}
  h2{color:var(--navy); font-size:1.35rem; margin-bottom:6px;}
  h3{color:var(--blue); font-size:1.05rem; margin:14px 0 8px;}
  p{line-height:1.55; margin-bottom:10px;}
  .muted{color:var(--gray); font-size:.9rem;}
  .scenario{background:var(--lightblue); border-left:5px solid var(--blue); border-radius:10px; padding:14px 16px; margin:14px 0; line-height:1.55;}
  .scenario .who{font-weight:700; color:var(--navy);}
  .vinculo{border-radius:10px; padding:10px 14px; margin:10px 0; font-size:.85rem; line-height:1.5;}
  .vinculo.alto{background:var(--greenbg); border:1px dashed var(--green);}
  .vinculo.baixo{background:var(--redbg); border:1px dashed var(--red);}
  .opts{display:flex; flex-direction:column; gap:10px; margin-top:14px;}
  button{font-family:inherit; font-size:.95rem; cursor:pointer;}
  .opt{background:#fff; border:2px solid #cfd9e6; border-radius:12px; padding:13px 16px; text-align:left; line-height:1.45; transition:all .15s;}
  .opt:hover:not(:disabled){border-color:var(--blue); background:var(--lightblue); transform:translateY(-1px);}
  .opt:disabled{cursor:default; opacity:.85;}
  .opt.correct{border-color:var(--green); background:var(--greenbg);}
  .opt.wrong{border-color:var(--red); background:var(--redbg);}
  .opt.eliminated{opacity:.35; text-decoration:line-through;}
  .feedback{border-radius:12px; padding:14px 16px; margin-top:14px; line-height:1.5; animation:fadeIn .3s;}
  .feedback.good{background:var(--greenbg); border:1px solid var(--green);}
  .feedback.bad{background:var(--redbg); border:1px solid var(--red);}
  .feedback .tag{font-weight:700; display:block; margin-bottom:4px;}
  .feedback.good .tag{color:var(--green);}
  .feedback.bad .tag{color:var(--red);}
  .src{display:block; margin-top:8px; font-size:.8rem; color:var(--gray); font-style:italic;}
  .btn{background:var(--navy); color:#fff; border:none; border-radius:24px; padding:12px 28px; font-size:1rem; font-weight:600; margin-top:18px; transition:all .15s;}
  .btn:hover{background:var(--blue); transform:translateY(-1px);}
  .btn.ghost{background:#fff; color:var(--navy); border:2px solid var(--navy);}
  .btn.hint{background:var(--amber); color:#5b4200; padding:8px 18px; font-size:.85rem;}
  .center{text-align:center;}
  .phase-badge{display:inline-block; background:var(--navy); color:#fff; border-radius:16px; padding:3px 14px; font-size:.75rem; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px;}
  .phase-badge.recover{background:#8e24aa;}
  .phase-badge.misto{background:#e65100;}
  .phase-badge.rescue{background:var(--red);}
  .progress-dots{display:flex; gap:6px; margin:10px 0; flex-wrap:wrap;}
  .dot{width:10px; height:10px; border-radius:50%; background:#cfd9e6;}
  .dot.done{background:var(--green);}
  .dot.now{background:var(--amber);}
  .order-pool{display:flex; flex-wrap:wrap; gap:10px; margin-top:14px;}
  .order-pool .opt{flex:1 1 45%; min-width:220px;}
  .order-pool .opt.locked{border-color:var(--green); background:var(--greenbg); cursor:default;}
  .order-pool .opt .num{display:inline-block; background:var(--green); color:#fff; border-radius:50%; width:22px; height:22px; text-align:center; line-height:22px; font-size:.8rem; margin-right:8px; font-weight:700;}
  .dica{background:#f4f4f4; border-left:5px solid var(--red); border-radius:8px; padding:12px 14px; margin:14px 0; font-size:.9rem; line-height:1.5;}
  .dica b{color:var(--red);}
  .badges{display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin:18px 0;}
  .badge{background:var(--lightblue); border:2px solid var(--blue); border-radius:14px; padding:12px 14px; text-align:center; width:140px;}
  .badge.off{opacity:.35; filter:grayscale(1);}
  .badge .emoji{font-size:1.7rem;}
  .badge .name{font-size:.75rem; font-weight:700; color:var(--navy); margin-top:4px;}
  .badge .stars{color:var(--amber); font-size:.9rem;}
  .score-big{font-size:3rem; font-weight:800; color:var(--navy);}
  .review{background:var(--lightblue); border-radius:12px; padding:14px 16px; margin:8px 0; font-size:.9rem; line-height:1.5; text-align:left;}
  .review b{color:var(--navy);}
  /* Mapa geral */
  .mg-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin-top:16px;}
  .mg-mod{background:#fff; border:2px solid #cfd9e6; border-radius:14px; padding:16px; text-align:left; transition:all .15s; position:relative;}
  .mg-mod:hover{border-color:var(--blue); transform:translateY(-2px); box-shadow:0 6px 16px rgba(13,44,84,.15);}
  .mg-mod.done{border-color:var(--green); background:var(--greenbg);}
  .mg-mod .code{display:inline-block; background:var(--navy); color:#fff; border-radius:8px; padding:2px 10px; font-size:.75rem; font-weight:700; letter-spacing:1px;}
  .mg-mod.done .code{background:var(--green);}
  .mg-mod .emoji{font-size:1.6rem; float:right;}
  .mg-mod .nm{font-weight:700; color:var(--navy); margin:8px 0 4px; font-size:.95rem;}
  .mg-mod .ds{font-size:.8rem; color:var(--gray); line-height:1.4;}
  .mg-mod .stars{color:var(--amber); font-size:1rem; position:absolute; bottom:8px; right:12px;}
  .mg-mod .check{position:absolute; top:-9px; right:-9px; background:var(--green); color:#fff; width:26px; height:26px; border-radius:50%; text-align:center; line-height:26px; font-weight:700; display:none;}
  .mg-mod.done .check{display:block;}
  /* Biblioteca (fichas-resumo) */
  details.fich{background:var(--lightblue); border-radius:12px; padding:10px 16px; margin:8px 0;}
  details.fich summary{font-weight:700; color:var(--navy); cursor:pointer; padding:6px 0; font-size:1rem;}
  details.fich .fbody{font-size:.9rem; line-height:1.6; padding:8px 0 4px;}
  details.fich .fbody b{color:var(--navy);}
  /* Perfis */
  .perfil-row{display:flex; align-items:center; gap:12px; background:#fff; border:2px solid #cfd9e6; border-radius:14px; padding:14px 16px; margin:10px 0; transition:all .15s; text-align:left; width:100%;}
  .perfil-row:hover{border-color:var(--blue); background:var(--lightblue); transform:translateY(-1px);}
  .perfil-row .avatar{font-size:1.6rem;}
  .perfil-row .pinfo{flex:1;}
  .perfil-row .pnome{font-weight:700; color:var(--navy);}
  .perfil-row .pprog{font-size:.8rem; color:var(--gray);}
  .perfil-del{background:none; border:none; color:var(--red); font-size:1.1rem; padding:6px 10px; border-radius:8px;}
  .perfil-del:hover{background:var(--redbg);}
  .perfil-novo{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;}
  .perfil-novo input{flex:1; min-width:200px; border:2px solid #cfd9e6; border-radius:12px; padding:12px 16px; font-family:inherit; font-size:1rem;}
  .perfil-novo input:focus{outline:none; border-color:var(--blue);}
  /* Navegação */
  .navbar{display:flex; gap:8px; flex-wrap:wrap; margin:-6px 0 14px;}
  .navbtn{background:#f0f4fa; border:1px solid #cfd9e6; border-radius:18px; padding:6px 14px; font-size:.8rem; color:var(--navy); font-weight:600; transition:all .15s;}
  .navbtn:hover{background:var(--lightblue); border-color:var(--blue); transform:translateY(-1px);}
  .navbtn:disabled{opacity:.4; cursor:default; transform:none;}
  /* Anamnese */
  .ana-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; margin-top:12px;}
  .ana-grid .opt{min-height:70px;}
  .ana-grid .opt.asked-good{border-color:var(--green); background:var(--greenbg); cursor:default;}
  .ana-grid .opt.asked-bad{border-color:var(--red); background:var(--redbg); cursor:default;}
  .ana-log{margin-top:12px;}
  .ana-resp{border-radius:10px; padding:10px 14px; margin:6px 0; font-size:.9rem; line-height:1.5; animation:fadeIn .3s;}
  .ana-resp.good{background:var(--greenbg); border-left:4px solid var(--green);}
  .ana-resp.bad{background:var(--redbg); border-left:4px solid var(--red);}
  .ana-counter{display:inline-block; background:var(--navy); color:#fff; border-radius:14px; padding:4px 12px; font-size:.8rem; font-weight:700;}
  /* Pontos flutuantes e confete */
  .scorepop{position:absolute; top:18px; right:24px; font-size:1.3rem; font-weight:800; color:var(--green); animation:popup 1.1s forwards; pointer-events:none; z-index:5;}
  @keyframes popup{0%{opacity:0; transform:translateY(8px);}25%{opacity:1;}100%{opacity:0; transform:translateY(-28px);}}
  .confetti{position:absolute; top:-20px; font-size:1.2rem; animation:fall 2.4s linear forwards; pointer-events:none; z-index:4;}
  @keyframes fall{to{transform:translateY(120vh) rotate(360deg); opacity:.2;}}
  /* Leitura em voz alta */
  #ttsBtn{position:fixed; bottom:18px; right:18px; z-index:50; background:var(--navy); color:#fff; border:none; border-radius:30px; padding:12px 20px; font-size:.95rem; font-weight:700; box-shadow:0 6px 18px rgba(0,0,0,.35); transition:all .15s;}
  #ttsBtn:hover{background:var(--blue); transform:translateY(-1px);}
  #ttsBtn.falando{background:var(--red); animation:pulse 1.2s infinite;}
  @media(max-width:600px){ .card{padding:18px;} .order-pool .opt{flex:1 1 100%;} }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <h1>🩺 Missão mhGAP · O Jogo Completo</h1>
    <div class="meter-wrap" id="trustWrap" style="display:none">
      <span>Confiança do paciente</span>
      <div class="meter"><div class="meter-fill" id="trustFill"></div></div>
      <span id="trustVal">100</span>
    </div>
    <div class="pill" id="playerPill" style="display:none">👤 <span id="playerName"></span></div>
    <div class="pill combo" id="comboPill" style="display:none">🔥 Combo ×2</div>
    <div class="pill" id="scorePill" style="display:none">⭐ <span id="scoreVal">0</span> pts</div>
    <button class="pill" id="muteBtn" style="border:none; cursor:pointer;" onclick="toggleMute()" title="Ativar/desativar som">🔊</button>
  </div>
  <div id="screen"></div>
</div>
<button id="ttsBtn" onclick="ouvirTela()" title="Ler em voz alta o texto desta tela">🗣️ Ouvir</button>

<script>
'use strict';
/* ================= ESTADO ================= */
var S = { trust:100, score:0, mod:0, done:{}, stars:{}, errors:[], combo:0, misto:false,
          ft:{}, /* primeira tentativa por módulo: {t: total, c: corretas} */
          vistos:{} /* perguntas já vistas por módulo (sorteio sem reposição + cobertura) */ };
var MODE = 'normal';   // normal | recover | misto | rescue
var PEND = [];         // cenários errados no módulo atual (rodada de recuperação)
var RUN_SAMPLE = {};   // perguntas sorteadas do banco para a rodada atual do módulo
var screen = document.getElementById('screen');

/* ================= PERFIS (multijogador no mesmo computador) ================= */
var PERFIS_KEY = 'mhgap_perfis';
var LEGACY_KEY = 'mhgap_jogo_v2';
var PERFIL = null; // {id, nome}

function saveKey(){ return PERFIL ? 'mhgap_save_'+PERFIL.id : LEGACY_KEY; }
function listarPerfis(){
  try{ var d = localStorage.getItem(PERFIS_KEY); return d ? JSON.parse(d) : []; }catch(e){ return []; }
}
function gravarPerfis(lista){ try{ localStorage.setItem(PERFIS_KEY, JSON.stringify(lista)); }catch(e){} }
function criarPerfil(nome){
  var lista = listarPerfis();
  var p = { id: Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36), nome: nome };
  lista.push(p); gravarPerfis(lista);
  return p;
}
function excluirPerfil(id){
  gravarPerfis(listarPerfis().filter(function(p){ return p.id!==id; }));
  try{ localStorage.removeItem('mhgap_save_'+id); }catch(e){}
  if(PERFIL && PERFIL.id===id) PERFIL=null;
}
function migrarLegacy(){
  // Se havia um save antigo (antes dos perfis), transforma em "Jogador(a) 1"
  try{
    var antigo = localStorage.getItem(LEGACY_KEY);
    if(antigo && listarPerfis().length===0){
      var p = criarPerfil('Jogador(a) 1');
      localStorage.setItem('mhgap_save_'+p.id, antigo);
      localStorage.removeItem(LEGACY_KEY);
    }
  }catch(e){}
}
function setPlayerPill(){
  var pill = document.getElementById('playerPill');
  if(PERFIL){ document.getElementById('playerName').textContent = PERFIL.nome; pill.style.display='block'; }
  else pill.style.display='none';
}
function resumoPerfil(p){
  try{
    var d = localStorage.getItem('mhgap_save_'+p.id);
    if(!d) return 'novo — sem progresso';
    d = JSON.parse(d);
    var mods = 0; for(var k in (d.done||{})) if(d.done[k]) mods++;
    var stars = 0; for(var j in (d.stars||{})) stars += d.stars[j];
    return mods+'/'+TOTAL_MODS+' módulos · '+(d.score||0)+' pts · '+stars+'★';
  }catch(e){ return ''; }
}

/* ================= UTILITÁRIOS ================= */
function setTrust(d){
  S.trust = Math.max(0, Math.min(100, S.trust + d));
  document.getElementById('trustFill').style.width = S.trust + '%';
  document.getElementById('trustVal').textContent = S.trust;
}
function addScore(n){ S.score += n; document.getElementById('scoreVal').textContent = S.score; }
function scorePop(n){
  var card = document.querySelector('.card'); if(!card) return;
  var el = document.createElement('div');
  el.className='scorepop'; el.textContent = '+'+n+(S.combo>=3?' 🔥':'');
  card.appendChild(el); setTimeout(function(){ el.remove(); }, 1100);
}
function setCombo(v){
  S.combo = v;
  document.getElementById('comboPill').style.display = (S.combo>=3 && MODE!=='rescue') ? 'block' : 'none';
}
function trustTier(){ return S.trust>=70 ? 'alto' : (S.trust>=40 ? 'medio' : 'baixo'); }
function logErr(fase, resumo, licao){ S.errors.push({fase:fase, resumo:resumo, licao:licao}); }
function showHud(v){
  document.getElementById('trustWrap').style.display = v ? 'flex' : 'none';
  document.getElementById('scorePill').style.display = v ? 'block' : 'none';
  if(!v) document.getElementById('comboPill').style.display='none';
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t;} return a; }

/* ---- som (WebAudio, sem arquivos externos) ---- */
var AC = null;
var MUTED = false;
try{ MUTED = localStorage.getItem('mhgap_mute')==='1'; }catch(e){}
function toggleMute(){
  MUTED = !MUTED;
  try{ localStorage.setItem('mhgap_mute', MUTED?'1':'0'); }catch(e){}
  var b = document.getElementById('muteBtn');
  if(b) b.textContent = MUTED ? '🔇' : '🔊';
}
function tone(freq, dur, delay, type, vol){
  if(MUTED) return;
  try{
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    var o = AC.createOscillator(), g = AC.createGain();
    o.type = type||'sine'; o.frequency.value = freq;
    g.gain.value = vol||0.08;
    o.connect(g); g.connect(AC.destination);
    var t0 = AC.currentTime + (delay||0);
    o.start(t0); g.gain.setValueAtTime(vol||0.08, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    o.stop(t0+dur+0.05);
  }catch(e){}
}
/* ---- leitura em voz alta (Web Speech API) ---- */
var TTS_OK = ('speechSynthesis' in window) && (typeof SpeechSynthesisUtterance !== 'undefined');
var VOZ_PT = null;
function escolherVoz(){
  try{
    var vozes = window.speechSynthesis.getVoices() || [];
    for(var i=0;i<vozes.length;i++){
      if((vozes[i].lang||'').toLowerCase().indexOf('pt-br')===0){ VOZ_PT=vozes[i]; return; }
    }
    for(var j=0;j<vozes.length;j++){
      if((vozes[j].lang||'').toLowerCase().indexOf('pt')===0){ VOZ_PT=vozes[j]; return; }
    }
  }catch(e){}
}
if(TTS_OK){
  escolherVoz();
  try{ window.speechSynthesis.onvoiceschanged = escolherVoz; }catch(e){}
}
function textoDaTela(){
  var card = document.querySelector('.card');
  if(!card) return '';
  var clone = card.cloneNode(true);
  // remove o que não é conteúdo: navegação, pop-ups de pontos, confetes
  var lixo = clone.querySelectorAll('.navbar, .scorepop, .confetti, #hintBtn');
  for(var i=0;i<lixo.length;i++) lixo[i].parentNode.removeChild(lixo[i]);
  var t = clone.innerText || clone.textContent || '';
  // limpa emojis, setas e símbolos que a voz leria de forma estranha
  t = t.replace(/[\u{1F000}-\u{1FAFF}\u{2190}-\u{21FF}\u{2300}-\u{27BF}\u{2B00}-\u{2BFF}\u{FE0F}\u{2000}-\u{206F}]/gu, ' ');
  t = t.replace(/[➜»✔✘★☆·×]/g, ' ');
  t = t.replace(/\s+/g, ' ').trim();
  return t;
}
function pararFala(){
  if(!TTS_OK) return;
  try{ window.speechSynthesis.cancel(); }catch(e){}
  var b = document.getElementById('ttsBtn');
  if(b){ b.classList.remove('falando'); b.innerHTML='🗣️ Ouvir'; }
}
function ouvirTela(){
  if(!TTS_OK) return;
  var synth = window.speechSynthesis;
  if(synth.speaking || synth.pending){ pararFala(); return; }
  var texto = textoDaTela();
  if(!texto) return;
  var u = new SpeechSynthesisUtterance(texto);
  u.lang = 'pt-BR';
  if(VOZ_PT) u.voice = VOZ_PT;
  u.rate = 1; u.pitch = 1;
  u.onend = pararFala;
  u.onerror = pararFala;
  var b = document.getElementById('ttsBtn');
  if(b){ b.classList.add('falando'); b.innerHTML='⏹ Parar leitura'; }
  try{ synth.speak(u); }catch(e){ pararFala(); }
}

function sndOk(){ tone(660,.12,0); tone(880,.16,.1); }
function sndErr(){ tone(180,.25,0,'square',0.05); }
function sndBadge(){ tone(523,.12,0); tone(659,.12,.11); tone(784,.12,.22); tone(1047,.3,.33); }
function confete(){
  var card = document.querySelector('.card'); if(!card) return;
  var emo=['🎉','⭐','🎊','✨','🏅'];
  for(var i=0;i<22;i++){
    var el=document.createElement('div');
    el.className='confetti';
    el.textContent=emo[Math.floor(Math.random()*emo.length)];
    el.style.left=(Math.random()*95)+'%';
    el.style.animationDelay=(Math.random()*0.7)+'s';
    card.appendChild(el);
    setTimeout(function(x){return function(){x.remove();};}(el), 3200);
  }
}

/* ---- persistência ---- */
function salvar(){
  if(!PERFIL) return;
  try{ localStorage.setItem(saveKey(), JSON.stringify({
    trust:S.trust, score:S.score, done:S.done, stars:S.stars,
    errors:S.errors, misto:S.misto, ft:S.ft, vistos:S.vistos })); }catch(e){}
}
function carregar(){
  if(!PERFIL) return null;
  try{ var d = localStorage.getItem(saveKey()); return d ? JSON.parse(d) : null; }catch(e){ return null; }
}
function apagarSave(){ try{ localStorage.removeItem(saveKey()); }catch(e){} }

/* ================= NAVEGAÇÃO ================= */
var HIST = [];
var NAVIGATING = false;
function remember(f){ if(!NAVIGATING) HIST.push(f); }
function goBack(){
  if(HIST.length>1){
    HIST.pop();
    var f = HIST[HIST.length-1];
    NAVIGATING = true; f(); NAVIGATING = false;
  }
}
function reiniciarJogo(){
  if(confirm('Reiniciar o jogo? Pontuação, medalhas e progresso salvos serão zerados.')){ apagarSave(); startGame(); }
}
function reiniciarModulo(){

function rescueRound(next){
  MODE = 'rescue';
  var c = RESCUE[Math.floor(Math.random()*RESCUE.length)];
  var ordem = shuffle(c.opts.map(function(o,idx){return idx;}));
  remember(function(){ rescueRound(next); });
  screen.innerHTML =
   '<div class="card">'+
     navBar({mapa:true})+
     '<span class="phase-badge rescue">⚠ Resgate do vínculo</span>'+
     '<p class="muted">A confiança chegou a zero: o paciente está prestes a abandonar o cuidado. Use as habilidades do PCE para recuperá-la.</p>'+
     '<div class="scenario">'+c.ctx+'</div>'+
     '<h3>'+c.q+'</h3>'+
     '<div class="opts" id="opts">'+
       ordem.map(function(idx){return '<button class="opt" data-i="'+idx+'">'+esc(c.opts[idx].t)+'</button>';}).join('')+
     '</div><div id="fb"></div>'+
   '</div>';
  var btns = document.querySelectorAll('#opts .opt');
  for(var b=0;b<btns.length;b++){
    (function(btn){
      btn.onclick = function(){
        var o=c.opts[+btn.dataset.i];
        for(var k=0;k<btns.length;k++){
          btns[k].disabled=true;
          if(c.opts[+btns[k].dataset.i].ok) btns[k].classList.add('correct');
        }
        if(o.ok){ sndOk(); setTrust(+30); fbBox(true, o.fb+' O paciente decide ficar. (Confiança restaurada para '+S.trust+')'); }
        else { sndErr(); btn.classList.add('wrong','shake'); setTrust(+15);
          fbBox(false, o.fb+' Um colega intervém e evita o abandono, mas o vínculo segue frágil. (Confiança: '+S.trust+')');
          logErr('PCE — Resgate do vínculo', c.q, 'Confiança zerada exige as habilidades de comunicação do PCE: escuta, sigilo, respeito e devolução de controle à pessoa.');
        }
        document.getElementById('fb').insertAdjacentHTML('beforeend',
          '<button class="btn" onclick="__next()">Continuar ➜</button>');
        window.__next = function(){ MODE='normal'; next(); };
      };
    })(btns[b]);
  }
}
function checkRescue(next){
  if(S.trust===0 && MODE==='normal'){ rescueRound(next); return true; }
  return false;
}

      fb:'PSI — manejo do comportamento agitado ou agressivo: prioridade antes de continuar o algoritmo. Desescalada verbal em ambiente calmo vem antes do fármaco; contenção é último recurso, nunca punição.'},
     {t:'Medicar imediatamente com dose alta intramuscular, antes de qualquer tentativa de conversa.', ok:false,

     {t:'Chamar a polícia e suspender o atendimento até ele se acalmar sozinho.', ok:false,

    licao:'Agitação aguda: desescalada verbal e ambiente seguro primeiro; medicação se falhar; contenção como último recurso.'},
   {ctx:'Davi melhora quando toma o antipsicótico oral, mas já recaiu duas vezes por abandono do comprimido, apesar do apoio da família.',
    q:'Quando considerar o antipsicótico de depósito (injetável de ação prolongada)?',
    opts:[
     {t:'Neste perfil: má adesão persistente ao oral com recaídas — nunca como porta de entrada do tratamento, evitando-o em gestantes/lactantes e sem uso em crianças e adolescentes.', ok:true,
      fb:'A flufenazina de depósito (12,5–50 mg IM a cada 2–4 semanas) serve à manutenção quando a adesão oral falha; é evitada em gestantes/lactantes e não se usa em menores.'},
     {t:'Em todo primeiro episódio, para garantir a adesão desde o início.', ok:false,
      fb:'No início calibram-se dose e efeitos com o oral. O depósito é ferramenta de manutenção, não de entrada.'},
     {t:'Nunca: injetáveis de ação prolongada violam a autonomia do paciente.', ok:false,
      fb:'Com consentimento informado, o depósito pode ser o que mantém a pessoa estável e livre na comunidade — autonomia real inclui não recair.'}
    ],
    licao:'Depósito: manutenção quando a adesão oral falha; nunca no início; evitar em gestantes e menores.'},
   {ctx:'<span class="who">Marina, 26 anos</span>: há 3 semanas afirma, com convicção inabalável, que colegas de trabalho "sussurram planos contra ela" — sem ouvir vozes, sem desorganização do discurso, comportamento preservado.',

    opts:[

      fb:'PSI 1, passo 3: psicose exige ≥ 2 de delírios, alucinações e desorganização do discurso/comportamento. Com só o delírio isolado, considere especialista para investigar outras causas antes de rotular.'},
     {t:'Sim: uma crença fixa e não compartilhada pela cultura já basta para diagnosticar e iniciar antipsicótico.', ok:false,
      fb:'Um delírio isolado não fecha o critério do algoritmo, que exige ao menos 2 dos 3 sintomas. Isso evita rotular e medicar precocemente.'},
     {t:'Não, e o comportamento preservado descarta qualquer condição MNS.', ok:false,

   {ctx:'Antes de encerrar a consulta, você faz a psicoeducação de Davi e da família sobre a psicose.',

    opts:[

      fb:'PSI 2.1 — psicoeducação: tratável, recuperação possível, sem culpabilizar; reconhecer precocemente o reaparecimento ou piora dos sintomas e procurar o serviço o quanto antes.'},
     {t:'"Psicose é uma sentença com poucas esperanças de melhora; o foco deve ser apenas conter os sintomas."', ok:false,
      fb:'Contradiz o módulo: a mensagem central é de esperança realista — condição tratável, com possibilidade de recuperação.'},
     {t:'Evitar comentar sinais de recaída com a família, para não gerar ansiedade antecipatória.', ok:false,

    ],
    licao:'Psicoeducação PSI: condição tratável, sem culpa, reconhecimento precoce de sinais de recaída.'},
   {ctx:'Beatriz, estabilizada após o episódio maníaco, pergunta sobre hábitos de vida no dia a dia.',
    q:'O que orientar, segundo o módulo?',
    opts:[
     {t:'Estilo de vida saudável (alimentação equilibrada, atividade física, sono regular, boa higiene), evitar álcool e cânabis, e ter cautela em decisões importantes (financeiras, compromissos), sobretudo em fases de mais energia.', ok:true,
      fb:'PSI 2.2: álcool e cânabis podem agravar sintomas psicóticos/bipolares; rotina regular evita privação de sono (gatilho de mania); decisões impulsivas pedem cautela.'},
     {t:'Evitar apenas bebidas alcoólicas; cânabis não interfere no transtorno bipolar.', ok:false,

     {t:'Sem restrição de substâncias: o essencial é manter a medicação em dia.', ok:false,

    licao:'PSI 2.2: evitar álcool e cânabis, manter rotina regular de sono, cautela em decisões importantes.'},
   {ctx:'A família de Davi pergunta se ele deve se afastar do trabalho "para descansar da doença".',

     {t:'Manter, tanto quanto possível, as atividades sociais, educacionais e ocupacionais regulares — é melhor que a pessoa tenha emprego ou ocupação produtiva, com treinamento de habilidades quando necessário.', ok:true,
      fb:'PSI 2.3: facilitar inclusão em atividades econômicas e oferecer capacitação de habilidades de vida/sociais, favorecendo a vida independente na comunidade.'},
     {t:'Sim: afastar-se do trabalho e das atividades sociais até a remissão completa dos sintomas.', ok:false,

     {t:'Só depois de 1 ano de estabilidade comprovada é que se pode considerar retomar atividades.', ok:false,

   {ctx:'Equipe discute iniciar lítio em paciente com transtorno bipolar recém-diagnosticado, numa unidade sem laboratório disponível.',

     {t:'Sim: lítio é sempre a melhor escolha, independentemente da disponibilidade de exames.', ok:false,

     {t:'Sim, desde que se inicie com dose baixa e se aumente lentamente; exames não são obrigatórios.', ok:false,

    licao:'Lítio 1ª linha só com monitoramento clínico-laboratorial possível; sem isso, valproato ou carbamazepina.'},
   {ctx:'Mesma unidade, sem estrutura para monitorar lítio ou valproato, com paciente em episódio maníaco.',

    opts:[

     {t:'Nenhuma: sem lítio ou valproato, não há tratamento farmacológico possível para a mania.', ok:false,

     {t:'Fluoxetina em dose baixa, para reduzir a agitação sem risco de mania.', ok:false,

    licao:'Sem monitoramento de lítio/valproato: haloperidol ou risperidona são as alternativas do módulo.'},
   {ctx:'Paciente em episódio maníaco com agitação intensa recebe diazepam associado ao estabilizador do humor.',

    opts:[

     {t:'Por até 6 meses, tempo considerado necessário para o estabilizador atingir seu efeito pleno.', ok:false,

    licao:'Benzodiazepínico na mania: no máximo 2–4 semanas, retirada gradual — nunca manutenção contínua.'},
   {ctx:'<span class="who">Davi</span>, em risperidona há 3 meses, ganhou 8 kg e a glicemia de jejum subiu.',

   {ctx:'<span class="who">Idosa de 82 anos com demência</span> apresenta sintomas psicóticos leves (crença de que "roubam" seus pertences).',

{ code:'EPI', emoji:'⚡', nome:'Epilepsia',

  acts:[
  {type:'ordena', data:{

  {type:'cenario', data:[

     {t:'Administrar diazepam IV conforme o protocolo padrão de convulsão e agendar retorno em uma semana.', ok:false,
      fb:'É o protocolo certo para a convulsão comum — mas gestante na 2ª metade sem epilepsia prévia tem ramo próprio: sulfato de magnésio e hospital com urgência. Aplicar o fluxo padrão atrasa o tratamento da eclâmpsia.'},
     {t:'Controlar a crise, solicitar EEG ambulatorial e iniciar investigação de epilepsia de início tardio.', ok:false,

   {ctx:'<span class="who">Marcos, 19 anos</span>, teve uma única crise convulsiva há um mês, após noite sem dormir. Exame neurológico normal.',
    q:'Ele tem epilepsia? Deve iniciar antiepiléptico?',

     {t:'Iniciar antiepiléptico em dose baixa por segurança: uma segunda crise poderia ocorrer dirigindo ou nadando.', ok:false,
      fb:'A prudência aqui é NÃO medicar: sem o critério (≥ 2 crises em dias diferentes no último ano), o antiepiléptico só traz efeitos colaterais. Oriente precauções e reavalie em 3 meses.'},
     {t:'Encaminhar para neurologia e aguardar EEG e neuroimagem antes de qualquer definição.', ok:false,

    licao:'Epilepsia = ≥ 2 crises em dias diferentes no último ano; crise única → seguimento, sem fármaco.'},
   {ctx:'<span class="who">Luana, 26 anos</span>, tem epilepsia confirmada e quer engravidar no futuro.',
    q:'Que cuidados o módulo exige nessa população especial?',
    opts:[

     {t:'Manter o esquema atual com valproato: trocar um medicamento que controla bem as crises aumentaria o risco.', ok:false,

     {t:'Suspender gradualmente o antiepiléptico assim que ela engravidar, para proteger o feto.', ok:false,

   {ctx:'A família de um paciente com epilepsia pede orientações para o dia a dia.',

    opts:[

   {ctx:'<span class="who">Menina, 3 anos</span>, com febre alta, teve uma crise convulsiva generalizada de 4 minutos, única, sem sinais focais. Recuperou-se bem.',

   {ctx:'Na emergência da unidade, a convulsão persiste mesmo após as 2 doses de diazepam.',

{ code:'SUB', emoji:'🍷', nome:'Uso de substâncias',

  {type:'cenario', data:[

var TOTAL_MODS = MODS.length;

/* ================= BIBLIOTECA (fichas-resumo do manual) ================= */
var FICHAS = [
/* PCE */ '<b>6 dicas de comunicação:</b> ambiente reservado e sigilo; envolver a pessoa; começar escutando; respeito e neutralidade moral; linguagem simples com perguntas abertas e resumos; sensibilidade nas experiências difíceis (violência, autoagressão).<br><b>Dignidade — SIM:</b> respeito, sigilo, privacidade, informação e consentimento, autonomia, decisões fundamentadas. <b>NÃO:</b> discriminar, ignorar prioridades, decidir pela pessoa, jargão técnico.<br><b>Avaliação:</b> queixa inicial → anamnese (MNS pregressa, clínica geral, familiar, psicossocial) → exame físico → EEM (aparência/comportamento, humor/afeto, conteúdo do pensamento, percepção, cognição) → diagnóstico diferencial + exames básicos → identificar a condição.<br><b>Manejo (8 etapas):</b> plano conjunto → psicossociais sempre → farmacológicas se indicadas → encaminhamento → seguimento → cuidador/família → vínculos intersetoriais → populações especiais.<br><b>Plano escrito:</b> farmacológicas (se houver) + psicossociais + referências + seguimento + comorbidades.<br><b>Tratamentos psicológicos:</b> TCC → DEP, MCO, SUB, PSI · TIP, ativação comportamental, relaxamento e solução de problemas → DEP · contingências e reforço motivacional → SUB · terapia familiar → PSI, SUB · habilidades parentais → MCO.<br><b>Dicas transversais:</b> transtorno mental grave = risco 2–3× de morte por doenças evitáveis; sempre que suspeitar de condição MNS, avaliar risco de suicídio (SUI).',
/* DEP */ '<b>Critérios:</b> ≥ 1 sintoma básico (humor deprimido ou anedonia) por ≥ 2 semanas + vários sintomas adicionais + prejuízo funcional.<br><b>Descartar:</b> condição física (anemia, hipotireoidismo, substâncias, medicamentos); história de mania (→ bipolar, Protocolo 2); grande perda em até 6 meses (luto: não tratar como depressão, salvo ideação suicida, sintomas psicóticos, lentidão psicomotora ou depressão prévia).<br><b>Com sintomas psicóticos:</b> adaptar o tratamento + ESPECIALISTA.<br><b>Manejo:</b> psicoeducação; redução do estresse; ativação/funcionamento; considerar antidepressivo; tratamentos breves (TIP, TCC, ativação, solução de problemas). NÃO usar injeções de vitamina.<br><b>Bipolar:</b> NUNCA antidepressivo sem estabilizador (lítio só com laboratório; carbamazepina; valproato).<br><b>Fluoxetina:</b> 10 → 20 mg/dia (máx. 80; idosos máx. 40). Interações: varfarina (evitar), tamoxifeno, codeína, tramadol; eleva ATCs e antipsicóticos. <b>Amitriptilina:</b> contraindicada em cardiopatas; overdose fatal; nunca em menores.<br><b>Populações:</b> adolescentes ≥ 12: SÓ fluoxetina, retorno semanal por 4 semanas; gestantes: psicossocial primeiro, evitar antidepressivo (sobretudo 1º trimestre); lactação: evitar fluoxetina; idosos: ISRS em dose baixa; risco de suicídio: ISRS + suprimento limitado.<br><b>Duração:</b> 9–12 meses após remissão; retirada gradual ≥ 4 semanas. <b>Seguimento:</b> 2ª consulta em 1 semana; contato mensal nos 3 primeiros meses; mania no seguimento → suspender antidepressivo e ir a PSI.',
/* PSI */ '<b>Ordem da avaliação:</b> 1º descartar causas médicas/delirium (febre, flutuação da consciência, metabólico, fármacos); 2º mania aguda; 3º psicose (≥ 2 de: delírios, alucinações, desorganização do discurso/comportamento).<br><b>Agitação aguda:</b> desescalada verbal + ambiente calmo ANTES de medicar; contenção é último recurso.<br><b>Mania:</b> SUSPENDER antidepressivo; lítio (só com monitoramento laboratorial e especialista), valproato, carbamazepina ou antipsicótico; benzodiazepínico por 2–4 semanas se agitação; manutenção ≥ 2 anos após o último episódio.<br><b>Psicose:</b> antipsicótico imediato, um por vez, dose baixa, teste de 4–6 semanas; monitorar peso, PA, glicemia, colesterol e ECG.<br><b>Doses iniciais:</b> haloperidol 1,5–3 mg/dia (máx. 20); risperidona 1 → 2–6 mg/dia; clorpromazina 25–50 → 75–300 mg/dia.<br><b>ECE</b> (tremor, rigidez, acatisia, distonia): ajustar dose e/ou biperideno (1 mg 2×/dia → 3–12 mg/dia). <b>SNM</b> (rigidez + febre + PA elevada): suspender e hospital.<br><b>Depósito (flufenazina 12,5–50 mg IM a cada 2–4 semanas):</b> manutenção com má adesão comprovada; nunca no início; evitar em gestantes/lactantes; não usar em menores.<br><b>Populações:</b> gestantes: evitar valproato/lítio/carbamazepina, haloperidol em dose baixa com especialista, sem anticolinérgico de rotina; adolescentes: risperidona só com especialista; idosos: doses menores (na demência: risco cerebrovascular e de morte).<br><b>Família:</b> não confrontar delírios; não culpar; liberdade de movimento; evitar hospitalização prolongada; evitar álcool e cânabis.',
/* EPI */ '<b>Emergência:</b> proteger (decúbito lateral, NADA na boca, não deixar só) → ABC + sinais vitais + cronometrar → acesso IV → diazepam 10 mg IV/retal (criança: 1 mg/ano) ou midazolam bucal/intranasal 5–10 mg → MÁXIMO 2 DOSES → persistiu: estado de mal → hospital: valproato 20 mg/kg, fenobarbital 15–20 mg/kg ou fenitoína 15–20 mg/kg IV (acesso exclusivo — extravasamento causa dano grave!).<br><b>Gestante (2ª metade) ou até 1 semana pós-parto sem epilepsia prévia:</b> ECLÂMPSIA → sulfato de magnésio 10 g IM + hidralazina se PAd > 110 + hospital com urgência.<br><b>Crise febril (6 m–6 a):</b> simples → investigar a febre (AIDPI), observar 24 h, sem antiepiléptico; complexa (focal, > 15 min ou repetida) → internação.<br><b>Diagnóstico:</b> ≥ 2 crises em dias diferentes no último ano. <b>Diferenciais:</b> síncope (pródromos: palidez, sudorese, escurecimento visual; recuperação rápida); pseudocrise (prolongada, olhos fechados, abalos arrítmicos, gatilho de estresse).<br><b>Causas:</b> asfixia/trauma ao nascer, TCE, neuroinfecção, história familiar; exame neurológico (déficits focais).<br><b>Tratamento:</b> monoterapia, dose mínima, aumento lento; atenção às interações (reduz efeito de anticoncepcionais hormonais, antirretrovirais, antipsicóticos); retirada SEMPRE gradual (considerar após 2 anos sem crises).<br><b>Populações:</b> mulher em idade fértil: folato 5 mg/dia, SEM valproato, parto hospitalar, vitamina K 1 mg IM no recém-nascido; lactação: carbamazepina preferível; HIV: valproato preferível, evitar fenitoína/carbamazepina; criança com problema comportamental: evitar fenobarbital.<br><b>Psicoeducação:</b> crise > 5 min = emergência; não é contagiosa; evitar fogo aberto, nadar sozinho e privação de sono; a maioria vive normalmente com adesão.',
/* MCO */ '<b>Avaliar:</b> desenvolvimento, desatenção/hiperatividade, problemas emocionais, comportamento desafiador/conduta — sempre incluindo ambiente doméstico E escolar, e investigando violência, abuso e negligência (mudança súbita de comportamento/regressão = alerta).<br><b>Atraso/transtorno do desenvolvimento:</b> psicoeducação, aconselhamento familiar, habilidades parentais, contato com a escola, especialista; SEM fármaco; seguimento a cada 3 meses.<br><b>Problemas de comportamento:</b> orientações aos pais (atenção positiva, instruções claras, consequências consistentes e não violentas), contato escolar; sem fármaco.<br><b>TDAH:</b> intervenções psicossociais primeiro; metilfenidato SÓ com insucesso psicossocial + diagnóstico confirmado + idade ≥ 6 anos, via ESPECIALISTA; seguimento trimestral.<br><b>Problemas emocionais:</b> queixas somáticas recorrentes, recusa escolar, ansiedade, timidez extrema → explorar estressores (inclusive bullying), orientar casa e escola.<br><b>Depressão moderada/grave no adolescente:</b> psicossocial; se persistir: FLUOXETINA (única opção), retorno SEMANAL no 1º mês (vigiar ideação suicida).<br><b>Adolescentes:</b> atender mesmo desacompanhados, com consentimento próprio e escuta em particular.<br><b>Cuidadores:</b> avaliar necessidades e apoiar (grupos, recursos da comunidade).',
/* DEM */ '<b>Suspeita:</b> declínio de memória/orientação + prejuízo nas atividades essenciais + evolução lenta ≥ 6 meses; SEMPRE entrevistar um informante.<br><b>Descartar:</b> DELIRIUM (início abrupto, curso flutuante, piora noturna → infecção — pedir urina —, fármacos anticolinérgicos, dor, desidratação, metabólico); PSEUDODEMÊNCIA (depressão → tratar DEP e reavaliar).<br><b>Características incomuns → especialista:</b> início < 60 anos; associação com TCE ou AVC; sinais de hipotireoidismo (bócio, pulso lento, pele seca); história de IST/HIV.<br><b>Manejo psicossocial:</b> rotina regular, pistas de orientação (calendário, relógio, objetos familiares), atividade física, atividades prazerosas, estímulo das capacidades preservadas; segurança com autonomia (cozinha, direção); nutrição/fortificação; tratar fatores cardiovasculares (fumo, HAS, diabetes, colesterol, obesidade).<br><b>Fármacos:</b> SEM inibidores de colinesterase (donepezila, galantamina, rivastigmina) ou memantina de rotina — apenas Alzheimer diagnosticado + supervisão e monitoramento especializados. Sintomas comportamentais: psicossocial primeiro; antipsicótico SÓ com risco iminente persistente (dose mínima, com revisão; risco cerebrovascular e de morte em idosos); EVITAR haloperidol IV e diazepam.<br><b>Cuidador:</b> avaliar impacto e necessidades; cuidados temporários (respite); grupos; terapia.<br><b>Seguimento:</b> regular e proativo — função, segurança, comportamento, fármacos e cuidador.',
/* SUB */ '<b>Rastreamento universal:</b> perguntar a TODOS sobre tabaco e álcool; atenção a pedidos recorrentes de psicoativos, lesões e infecções (HIV, hepatite C).<br><b>Emergências:</b> overdose de opioide (miose puntiforme + FR baixa + inconsciência) → via aérea e ventilação; abstinência de álcool/sedativos (tremor, sudorese, taquicardia, convulsões, delirium — PODE SER FATAL); intoxicação por estimulante (midríase, hipertensão, agitação, paranoia) → ambiente calmo + monitoramento cardiovascular + benzodiazepínico se grave.<br><b>Assinaturas (Quadro 1):</b> álcool/benzodiazepínicos: fala arrastada, desinibição; opioides: miose e sonolência; estimulantes: midríase, euforia, taquicardia; cânabis: conjuntivas vermelhas, risco de psicose; solventes: risco de arritmia e morte súbita; tramadol: efeitos opioides + risco de convulsão.<br><b>Uso prejudicial:</b> intervenção breve + entrevista motivacional + redução de danos (material estéril, testagem, vacinas) + necessidades sociais.<br><b>Dependência de álcool:</b> desintoxicação planejada (interrupção súbita pode matar), tiamina 100 mg/dia (prevenir Wernicke: confusão + nistagmo + oftalmoplegia), prevenção de recaída: acamprosato, naltrexona ou dissulfiram (baclofeno só com especialista).<br><b>Opioides:</b> manutenção com agonistas &gt; desintoxicação isolada; abstinência (midríase, cólicas, piloereção) é sintomática e raramente fatal — o perigo é a overdose na recaída.<br><b>Benzodiazepínicos:</b> redução gradual com dispensação supervisionada.<br><b>Gestantes:</b> abstinência total, com acolhimento. <b>Comorbidades:</b> reavaliar após 2–3 semanas de abstinência.',
/* SUI */ '<b>Avaliar risco sempre que houver:</b> condição MNS prioritária, dor crônica, sofrimento emocional agudo, desesperança extrema, pensamentos/planos/atos atuais ou passados. PERGUNTAR NÃO INDUZ — em nenhuma idade.<br><b>Ato grave do ponto de vista médico (Protocolo 1):</b> tratar clinicamente (intoxicação, sangramento) em ambiente seguro e de apoio; NUNCA deixar a pessoa sozinha; avaliar o risco após a estabilização — antes de qualquer alta.<br><b>Risco iminente = pensamento ou plano ATUAL (Protocolo 2):</b> eliminar os meios (agrotóxicos, armas, medicamentos), ambiente seguro e tranquilo, supervisão contínua, ativar apoio psicossocial, consultar especialista.<br><b>Risco não iminente (Protocolo 3):</b> apoio psicossocial, especialista se disponível, contato e seguimento periódicos MANTIDOS pela atenção primária.<br><b>Tratar as bases:</b> condição MNS concomitante (DEP, SUB, PSI, EPI, MCO), dor crônica; sintomas emocionais → OUT.<br><b>Prescrição segura:</b> ISRS (nunca frasco cheio de tricíclico — overdose de amitriptilina mata), suprimento fracionado (1 semana), cuidadores guardam e vigiam.<br><b>Adolescentes:</b> avaliar em particular, sem julgamento; autoagressão prévia é grande preditor.<br><b>Pós-crise:</b> é o período de maior risco — contato frequente no início.',
/* OUT */ '<b>Fluxo:</b> descartar causa física e os módulos específicos → há sofrimento/prejuízo funcional? → houve exposição a estressor extremo?<br><b>Vetos:</b> SEM ansiolíticos ou antidepressivos (salvo orientação de especialista); SEM injeções de vitamina ou tratamentos ineficazes; EVITAR exames sem indicação clara (podem causar dano e preocupação).<br><b>Sintomas sem explicação física:</b> reconhecer que são REAIS (não imaginários); comunicar resultados normais; pedir a explicação da própria pessoa (revela preocupações e melhora adesão); explicar a ligação estresse–corpo; incentivar a continuidade das atividades diárias; ensinar relaxamento (respiração lenta); reativar redes sociais.<br><b>Estressores extremos (violência, acidentes, desastres, perdas):</b> NÃO pressionar a falar do acontecimento; atender necessidades básicas e de proteção; conectar a apoios; retomada gradual da rotina.<br><b>Luto:</b> reação normal, sem maneira certa de viver; apoiar rituais culturalmente apropriados; SEM fármacos. <b>Luto prolongado</b> (≥ 6 meses + prejuízo + preocupação/saudade intensa) → especialista.<br><b>TEPT:</b> suspeitar com ≥ 1 mês de revivescências, pesadelos, evitação e prejuízo importante → especialista.'
];

function biblioteca(abrir){
  remember(function(){ biblioteca(abrir); });
  var blocos = MODS.map(function(m,i){
    return '<details class="fich"'+(abrir===i?' open':'')+'><summary>'+m.emoji+' '+m.code+' — '+m.nome+'</summary><div class="fbody">'+FICHAS[i]+'</div></details>';
  }).join('');
  screen.innerHTML =
   '<div class="card">'+
     navBar({mapa:true})+
     '<span class="phase-badge">📖 Biblioteca</span>'+
     '<h2>Fichas-resumo do MI-mhGAP</h2>'+
     '<p class="muted">Consulta rápida por módulo — ideal para revisar antes de rejogar. A fonte completa e definitiva é sempre o manual.</p>'+
     blocos+
   '</div>';
}
function ficha(i){ biblioteca(i); }

/* ================= TELAS ================= */

function telaPerfis(){
  PERFIL = null;
  HIST = [telaPerfis];
  showHud(false); setPlayerPill();
  // Ranking: ordena por pontuação (e estrelas como desempate) — motivação social para turmas
  var lista = listarPerfis().map(function(p){
    var score=0, stars=0;
    try{
      var d = localStorage.getItem('mhgap_save_'+p.id);
      if(d){ d=JSON.parse(d); score=d.score||0; for(var k in (d.stars||{})) stars+=d.stars[k]; }
    }catch(e){}
    return {p:p, score:score, stars:stars};
  }).sort(function(a,b){ return (b.score-a.score) || (b.stars-a.stars); });
  var medalhas = ['🥇','🥈','🥉'];
  var rows = lista.map(function(x, idx){
    var p = x.p;
    var aval = (lista.length>1 && x.score>0 && idx<3) ? medalhas[idx] : '👤';
    return '<div style="display:flex; align-items:center; gap:6px;">'+
      '<button class="perfil-row" onclick="selecionarPerfil(\''+p.id+'\')">'+
        '<span class="avatar">'+aval+'</span>'+
        '<span class="pinfo"><span class="pnome">'+esc(p.nome)+'</span><br><span class="pprog">'+resumoPerfil(p)+'</span></span>'+
        '<span style="color:var(--blue); font-weight:700;">Entrar ➜</span>'+
      '</button>'+
      '<button class="perfil-del" title="Excluir jogador" onclick="uiExcluirPerfil(\''+p.id+'\')">🗑</button>'+
    '</div>';
  }).join('');
  screen.innerHTML =
   '<div class="card">'+
     '<div class="center"><div style="font-size:2.6rem">🧠🩺</div>'+
     '<h2>Quem vai jogar?</h2>'+
     '<p class="muted">Cada jogador tem seu próprio progresso salvo neste computador/navegador. A lista é o ranking: pontos e estrelas definem o pódio.</p></div>'+
     (rows || '<p class="muted center" style="margin-top:14px">Nenhum jogador ainda — crie o primeiro abaixo.</p>')+
     '<div class="perfil-novo">'+
       '<input type="text" id="novoNome" maxlength="30" placeholder="Nome do novo jogador" onkeydown="if(event.key===\'Enter\')uiCriarPerfil()">'+
       '<button class="btn" style="margin-top:0" onclick="uiCriarPerfil()">➕ Criar jogador</button>'+
     '</div>'+
   '</div>';
}
function uiCriarPerfil(){
  var inp = document.getElementById('novoNome');
  var nome = (inp && inp.value ? inp.value : '').trim();
  if(!nome){ if(inp){ inp.focus(); inp.placeholder='Digite um nome para começar'; } return; }
  var p = criarPerfil(nome);
  selecionarPerfil(p.id);
}
function uiExcluirPerfil(id){
  var p = listarPerfis().filter(function(x){return x.id===id;})[0];
  if(p && confirm('Excluir o jogador "'+p.nome+'" e todo o seu progresso?')){
    excluirPerfil(id); telaPerfis();
  }
}
function selecionarPerfil(id){
  PERFIL = listarPerfis().filter(function(p){return p.id===id;})[0] || null;
  if(!PERFIL){ telaPerfis(); return; }
  setPlayerPill();
  telaInicial();
}
function trocarJogador(){
  salvar(); // preserva o ponto atual do jogador que está saindo
  telaPerfis();
}

function telaInicial(){
  if(!PERFIL){ telaPerfis(); return; }
  HIST = [telaPerfis, telaInicial];
  showHud(false); setPlayerPill();
  var save = carregar();
  var badgesHtml = MODS.map(function(m){return '<div class="badge off"><div class="emoji">'+m.badge.emoji+'</div><div class="name">'+m.badge.name+'</div></div>';}).join('');
  var continuar = save ? '<button class="btn" onclick="continuarJogo()">▶ Continuar plantão ('+Object.keys(save.done||{}).length+'/'+TOTAL_MODS+' módulos, '+ (save.score||0) +' pts)</button> ' : '';
  screen.innerHTML =
   '<div class="card center">'+
     '<div style="font-size:3rem">🧠🩺</div>'+
     '<h2>Missão mhGAP — O Jogo Completo</h2>'+
     '<p class="muted">👤 '+esc(PERFIL.nome)+' · Baseado no MI-mhGAP 2.0 (OPAS/OMS) — todos os módulos</p>'+
     '<p style="max-width:600px;margin:14px auto;">Você é profissional de uma unidade de atenção primária. No <b>Mapa Geral</b>, escolha um módulo, conduza anamneses, atenda os pacientes virtuais e percorra os algoritmos do manual: <b>PCE, DEP, PSI, EPI, MCO, DEM, SUB, SUI e OUT</b>.</p>'+
     '<div class="dica" style="text-align:left;max-width:600px;margin:14px auto;"><b>Como funciona:</b> a <b>confiança do paciente</b> tem consequências — alta, ele coopera e dá pistas; baixa, ele omite informações e seus acertos valem menos; zerada, ele ameaça abandonar o cuidado. Acertos em sequência ativam o <b>combo ×2</b>. Os casos em que você errar <b>voltam</b> no fim do módulo, e o plantão só termina após a <b>rodada mista final</b>. As <b>perguntas de cada módulo são sorteadas de um banco</b> com 10 ou mais casos — cada jogada é diferente. Seu progresso é salvo automaticamente. Para acessibilidade, o botão <b>🗣️ Ouvir</b> (canto inferior direito) lê em voz alta o texto de cada tela.</div>'+
     '<div class="badges">'+badgesHtml+'</div>'+
     continuar+
     '<button class="btn'+(save?' ghost':'')+'" onclick="apagarSave(); startGame()">'+(save?'Novo jogo':'▶ Iniciar plantão')+'</button> '+
     '<button class="btn ghost" onclick="telaPerfis()">👤 Trocar de jogador</button>'+
   '</div>';
}

function continuarJogo(){
  var d = carregar();
  if(d){
    S.trust=d.trust; S.score=d.score; S.done=d.done||{}; S.stars=d.stars||{};
    S.errors=d.errors||[]; S.misto=!!d.misto; S.ft=d.ft||{}; S.vistos=d.vistos||{}; S.combo=0;
  }
  HIST=[telaPerfis, telaInicial];
  showHud(true); setTrust(0); addScore(0); setCombo(0);
  mapaGeral();
}

function startGame(){
  S.trust=100; S.score=0; S.errors=[]; S.done={}; S.stars={}; S.combo=0; S.misto=false; S.ft={}; S.vistos={};
  MODE='normal'; PEND=[];
  HIST = [telaPerfis, telaInicial];
  showHud(true); setTrust(0); addScore(0); setCombo(0);
  mapaGeral();
}

function nDone(){ var n=0; for(var k in S.done) if(S.done[k]) n++; return n; }
function starsHtml(n){ var s=''; for(var i=0;i<3;i++) s += i<n?'★':'☆'; return s; }
function cobertura(i){
  var total=0, vistas=0, v = S.vistos[i] || {};
  MODS[i].acts.forEach(function(a){
    if(a.type==='cenario') a.data.forEach(function(c){ total++; if(v[c.q]) vistas++; });
  });
  return {v:vistas, t:total, completo:vistas>=total};
}

function mapaGeral(){
  remember(mapaGeral);
  salvar();
  var cards = MODS.map(function(m,i){
    var cob = cobertura(i);
    return '<button class="mg-mod'+(S.done[i]?' done':'')+'" onclick="introMod('+i+')">'+
      '<span class="check">✓</span>'+
      '<span class="emoji">'+m.emoji+'</span>'+
      '<span class="code">'+m.code+'</span>'+
      '<div class="nm">'+m.nome+'</div>'+
      '<div class="ds">'+m.desc+'</div>'+
      '<div class="ds" style="margin-top:6px">📚 '+cob.v+'/'+cob.t+' casos vistos'+(cob.completo?' ✓':'')+'</div>'+
      (S.done[i] ? '<span class="stars">'+starsHtml(S.stars[i]||1)+'</span>' : '')+
    '</button>';
  }).join('');
  var fim;
  if(nDone()===TOTAL_MODS && !S.misto){
    fim = '<div class="center"><button class="btn" onclick="runMisto()">⚡ Plantão misto final — 6 casos-relâmpago</button><p class="muted">A rodada final sorteia casos de todos os módulos. Só depois dela o plantão se encerra.</p></div>';
  } else if(S.misto){
    fim = '<div class="center"><button class="btn" onclick="telaFinal()">🏅 Ver placar final</button> <button class="btn ghost" onclick="runMisto()">⚡ Repetir plantão misto</button></div>';
  } else {
    fim = '<p class="muted center" style="margin-top:14px">Módulos concluídos: '+nDone()+' de '+TOTAL_MODS+'. Complete todos para liberar o plantão misto final.</p>';
  }
  screen.innerHTML =
   '<div class="card">'+
     navBar({})+
     '<span class="phase-badge">MG · Mapa Geral</span>'+
     '<h2>Escolha o próximo módulo</h2>'+
     '<p class="muted">Como no manual, o Mapa Geral orienta para onde ir. Estrelas refletem os acertos de primeira tentativa — a 3ª estrela exige ver todos os casos do banco.</p>'+
     '<div class="center" style="margin:4px 0 8px"><button class="navbtn" onclick="biblioteca()">📖 Biblioteca — fichas-resumo do manual</button></div>'+
     '<div class="mg-grid">'+cards+'</div>'+fim+
   '</div>';
}

function introMod(i){
  S.mod=i;
  MODE='normal'; PEND=[]; RUN_SAMPLE={}; // novo sorteio de perguntas a cada rodada do módulo
  S.ft[i]={t:0,c:0}; // zera stats ao (re)começar o módulo
  // Novo paciente, novo vínculo: quem chegou com a confiança baixa recomeça de um patamar base
  var recomecou = S.trust < 70;
  S.trust = Math.max(S.trust, 70); setTrust(0);
  // Reabre a pontuação dos desafios deste módulo (rejogá-lo inteiro pontua; revisitar pelo Voltar, não)
  MODS[i].acts.forEach(function(a){
    if(a.type==='cenario') a.data.forEach(function(c){ delete c._scored; });
    else delete a.data._scored;
  });
  remember(function(){ introMod(i); });
  var m=MODS[i];
  screen.innerHTML =
   '<div class="card center">'+
     navBar({mapa:true})+
     '<div style="font-size:2.6rem">'+m.emoji+'</div>'+
     '<span class="phase-badge">'+m.code+'</span>'+
     '<h2>'+m.nome+'</h2>'+
     '<p style="max-width:560px;margin:10px auto;">'+m.intro+'</p>'+
     (recomecou ? '<p class="muted">🤝 Paciente novo, vínculo novo: a confiança recomeça em '+S.trust+'.</p>' : '')+
     '<button class="btn" onclick="runAct(0)">Começar módulo</button> '+
     '<button class="btn ghost" onclick="mapaGeral()">↩ Mapa Geral</button>'+
   '</div>';
}

function runAct(a){
  var m=MODS[S.mod];
  if(a>=m.acts.length){ recoverRound(); return; }
  var act=m.acts[a];
  if(act.type==='cenario'){
    // Sorteio SEM reposição: prioriza perguntas que este jogador ainda não viu,
    // garantindo que rodadas sucessivas cubram o banco inteiro do módulo.
    if(!RUN_SAMPLE[a]){
      if(act.data.length>5){
        var vist = S.vistos[S.mod] || {};
        var novas = act.data.filter(function(c){ return !vist[c.q]; });
        var antigas = act.data.filter(function(c){ return vist[c.q]; });
        var sel = shuffle(novas).slice(0,4);
        if(sel.length<4) sel = sel.concat(shuffle(antigas).slice(0, 4-sel.length));
        RUN_SAMPLE[a] = sel;
      } else RUN_SAMPLE[a] = act.data;
    }
    cenario(RUN_SAMPLE[a], 0, function(){ runAct(a+1); });
  }
  else if(act.type==='ordena') ordena(act.data, function(){ runAct(a+1); });
  else if(act.type==='anamnese') anamnese(act.data, function(){ runAct(a+1); });
}

function dots(total, now){
  var h='<div class="progress-dots">';
  for(var i=0;i<total;i++) h+='<div class="dot '+(i<now?'done':i===now?'now':'')+'"></div>';
  return h+'</div>';
}

function tierBanner(){
  var t = trustTier();
  if(MODE!=='normal') return '';
  if(t==='alto') return '<div class="vinculo alto">💚 <b>Vínculo forte:</b> o paciente confia em você e colabora. Se precisar, peça mais detalhes (elimina uma opção errada).</div>';
  if(t==='baixo') return '<div class="vinculo baixo">💔 <b>Vínculo frágil:</b> o paciente responde com evasivas e omite detalhes. Seus acertos valem metade dos pontos até a confiança se recuperar.</div>';
  return '';
}

/* ---- cenários ---- */
function cenario(lista, i, done){
  if(i>=lista.length){ done(); return; }
  remember(function(){ cenario(lista, i, done); });
  var m=MODS[S.mod], c=lista[i];
  var badgeCls = MODE==='recover' ? ' recover' : (MODE==='misto' ? ' misto' : '');
  var badgeTxt = MODE==='recover' ? '🔁 Recuperação · '+m.code : (MODE==='misto' ? '⚡ Plantão misto · '+(c._src||m.code) : m.code+' · '+m.nome);
  var ordem = shuffle(c.opts.map(function(o,idx){return idx;}));
  var hintBtn = (trustTier()==='alto' && MODE==='normal')
    ? '<button class="btn hint" id="hintBtn">💬 Pedir mais detalhes ao paciente (a consulta se alonga: −4 de confiança)</button>' : '';
  screen.innerHTML =
   '<div class="card">'+
     navBar({modulo:MODE==='normal', mapa:true})+
     '<span class="phase-badge'+badgeCls+'">'+badgeTxt+'</span>'+
     dots(lista.length, i)+
     tierBanner()+
     '<div class="scenario">'+c.ctx+'</div>'+
     '<h3>'+c.q+'</h3>'+
     hintBtn+
     '<div class="opts" id="opts">'+
       ordem.map(function(idx){return '<button class="opt" data-i="'+idx+'">'+esc(c.opts[idx].t)+'</button>';}).join('')+
     '</div>'+
     '<div id="fb"></div>'+
   '</div>';
  var hb = document.getElementById('hintBtn');
  if(hb){ hb.onclick = function(){
    setTrust(-4); // pedir detalhes tem custo: a consulta se alonga
    var wrong = [];
    var bs = document.querySelectorAll('#opts .opt');
    for(var k=0;k<bs.length;k++) if(!c.opts[+bs[k].dataset.i].ok && !bs[k].classList.contains('eliminated')) wrong.push(bs[k]);
    if(wrong.length>1){
      var el = wrong[Math.floor(Math.random()*wrong.length)];
      el.classList.add('eliminated'); el.disabled=true;
    }
    hb.disabled = true; hb.textContent = '💬 O paciente deu uma pista.';
  };}
  var btns = document.querySelectorAll('#opts .opt');
  for(var b=0;b<btns.length;b++){
    (function(btn){
      btn.onclick = function(){
        var o=c.opts[+btn.dataset.i];
        // Anti-farm: revisitar (pelo Voltar) um cenário já pontuado não gera pontos, confiança nem registros
        var repeat = (MODE==='normal' && c._scored===true);
        if(MODE==='normal') c._scored = true;
        for(var k=0;k<btns.length;k++){
          btns[k].disabled=true;
          if(c.opts[+btns[k].dataset.i].ok) btns[k].classList.add('correct');
        }
        if(MODE==='normal' && !repeat){
          S.ft[S.mod].t++; if(o.ok) S.ft[S.mod].c++;
          if(!S.vistos[S.mod]) S.vistos[S.mod] = {};
          S.vistos[S.mod][c.q] = true; // registra cobertura do banco
        }
        if(o.ok){
          sndOk();
          if(!repeat){
            setCombo(S.combo+1);
            var base = MODE==='recover' ? 50 : 100;
            var mult = (S.combo>=3 && MODE==='normal') ? 2 : 1;
            var tierCut = (trustTier()==='baixo' && MODE==='normal') ? 0.5 : 1;
            var ganho = Math.round(base*mult*tierCut);
            addScore(ganho); scorePop(ganho); setTrust(+5);
          }
          fbBox(true, o.fb + (repeat ? ' (Revisita: sem nova pontuação.)' : ''));
        } else {
          sndErr();
          setCombo(0);
          btn.classList.add('wrong','shake');
          if(!repeat) setTrust(-12);
          fbBox(false, o.fb + (repeat ? ' (Revisita: sem novo registro.)' : ''));
          if(MODE==='normal' && !repeat){
            logErr(m.code+' — '+m.nome, c.q, c.licao);
            PEND.push(c);
          } else if(MODE==='misto'){
            logErr((c._src||m.code)+' — plantão misto', c.q, c.licao);
          }
        }
        document.getElementById('fb').insertAdjacentHTML('beforeend',
          '<button class="btn" onclick="__next()">Continuar ➜</button>');
        window.__next = function(){
          var adv = function(){ cenario(lista, i+1, done); };
          if(!checkRescue(adv)) adv();
        };
      };
    })(btns[b]);
  }
}
function fbBox(ok, txt){
  document.getElementById('fb').innerHTML =
   '<div class="feedback '+(ok?'good':'bad')+'">'+
      '<span class="tag">'+(ok?'✔ Boa decisão!':'✘ O manual orienta diferente')+'</span>'+
      esc(txt)+
      '<span class="src">Fonte: MI-mhGAP 2.0 (OPAS/OMS)</span>'+
    '</div>';
}

/* ---- anamnese (o jogador escolhe o que perguntar) ----
   Escolhas ruins custam CONFIANÇA, não orçamento: o erro dói, mas é recuperável.
   O jogador pode encerrar cedo — e responder pelo que deixou de perguntar. */
function anamnese(cfg, done){
  remember(function(){ anamnese(cfg, done); });
  var m=MODS[S.mod];
  var feitos = {}, obtidas = 0, agiu = false;
  var repeat = (cfg._scored===true); // anti-farm via Voltar
  screen.innerHTML =
   '<div class="card">'+
     navBar({modulo:true, mapa:true})+
     '<span class="phase-badge">'+m.code+' · Anamnese</span>'+
     tierBanner()+
     '<div class="scenario">'+cfg.intro+'</div>'+
     '<p class="muted">A informação está incompleta. Escolha <b>como conduzir a consulta</b>. Ações mal escolhidas custam a confiança do paciente. <span class="ana-counter" id="anaCount">Essenciais: 0/'+cfg.max+'</span></p>'+
     '<div class="ana-grid" id="anaGrid">'+
       shuffle(cfg.itens.map(function(o,idx){return idx;})).map(function(idx){
         return '<button class="opt" data-i="'+idx+'">'+esc(cfg.itens[idx].t)+'</button>';
       }).join('')+
     '</div>'+
     '<div class="center"><button class="btn ghost" id="anaDone" disabled>Encerrar anamnese e decidir ➜</button></div>'+
     '<div class="ana-log" id="anaLog"></div>'+
     '<div id="fb"></div>'+
   '</div>';
  var grid = document.getElementById('anaGrid');
  var btns = grid.querySelectorAll('.opt');
  var doneBtn = document.getElementById('anaDone');
  function concluir(){
    cfg._scored = true;
    for(var k=0;k<btns.length;k++) btns[k].disabled=true;
    doneBtn.disabled=true; doneBtn.style.display='none';
    var perdidos = [];
    for(var j=0;j<cfg.itens.length;j++){
      if(cfg.itens[j].ok && !feitos[j]) perdidos.push(cfg.itens[j]);
    }
    var htmlPerd = '';
    if(perdidos.length){
      htmlPerd = '<div class="feedback bad"><span class="tag">✘ Informação essencial ficou de fora</span>'+
        perdidos.map(function(p){return '• '+esc(p.t)+'<br><i>'+esc(p.note)+'</i>';}).join('<br>')+
        '<span class="src">Fonte: MI-mhGAP 2.0 (OPAS/OMS)</span></div>';
      if(!repeat){ logErr(m.code+' — '+m.nome, 'Anamnese incompleta', cfg.licao); setTrust(-6); }
      sndErr(); setCombo(0);
    } else {
      htmlPerd = '<div class="feedback good"><span class="tag">✔ Anamnese completa!</span>'+esc(cfg.licao)+
        '<span class="src">Fonte: MI-mhGAP 2.0 (OPAS/OMS)</span></div>';
      sndOk();
      if(!repeat){ addScore(80); scorePop(80); }
    }
    document.getElementById('fb').innerHTML = htmlPerd +
      '<button class="btn" onclick="__next()">Continuar ➜</button>';
    window.__next = function(){
      var adv = done;
      if(!checkRescue(adv)) adv();
    };
  }
  doneBtn.onclick = function(){ if(agiu) concluir(); };
  for(var b=0;b<btns.length;b++){
    (function(btn){
      btn.onclick = function(){
        if(btn.disabled) return;
        var it = cfg.itens[+btn.dataset.i];
        feitos[+btn.dataset.i]=true;
        btn.disabled=true;
        agiu = true; doneBtn.disabled=false;
        if(it.ok){
          obtidas++;
          document.getElementById('anaCount').textContent = 'Essenciais: '+obtidas+'/'+cfg.max;
          btn.classList.add('asked-good');
          sndOk();
          if(!repeat){ addScore(30); scorePop(30); setTrust(+3); }
          document.getElementById('anaLog').insertAdjacentHTML('beforeend',
            '<div class="ana-resp good"><b>Paciente:</b> '+esc(it.resp)+'<br><i>'+esc(it.note)+'</i></div>');
          if(obtidas>=cfg.max) concluir();
        } else {
          btn.classList.add('asked-bad');
          sndErr(); setCombo(0);
          if(!repeat) setTrust(-8);
          document.getElementById('anaLog').insertAdjacentHTML('beforeend',
            '<div class="ana-resp bad"><b>Reação:</b> '+esc(it.resp)+'<br><i>'+esc(it.note)+'</i></div>');
        }
      };
    })(btns[b]);
  }
}

/* ---- ordenar etapas (anti-exploit: 2 erros = reembaralhar) ---- */
function ordena(cfg, done){
  remember(function(){ ordena(cfg, done); });
  var m=MODS[S.mod];
  var alvo=0, erros=0, errosSeq=0;
  function renderPool(){
    var livres = [];
    for(var j=alvo;j<cfg.itens.length;j++) livres.push(j);
    livres = shuffle(livres);
    var travados = '';
    for(var l=0;l<alvo;l++){
      travados += '<button class="opt locked"><span class="num">'+(l+1)+'</span>'+esc(cfg.itens[l])+'</button>';
    }
    document.getElementById('pool').innerHTML = travados +
      livres.map(function(idx){return '<button class="opt" data-i="'+idx+'">'+esc(cfg.itens[idx])+'</button>';}).join('');
    bind();
  }
  screen.innerHTML =
   '<div class="card">'+
     navBar({modulo:true, mapa:true})+
     '<span class="phase-badge">'+m.code+' · '+m.nome+'</span>'+
     '<div class="scenario">'+cfg.intro+'</div>'+
     '<p class="muted">Toque as etapas na ordem correta (1ª, 2ª, 3ª…). Dois erros seguidos reembaralham as opções.</p>'+
     '<div class="order-pool" id="pool"></div>'+
     '<div id="fb"></div>'+
   '</div>';
  function bind(){
    var btns=document.querySelectorAll('#pool .opt:not(.locked)');
    for(var b=0;b<btns.length;b++){
      (function(btn){
        btn.onclick=function(){
          var repeat = (cfg._scored===true); // anti-farm via Voltar
          if(+btn.dataset.i === alvo){
            sndOk();
            alvo++; errosSeq=0;
            if(!repeat){ addScore(40); scorePop(40); setTrust(+1); }
            if(alvo===cfg.itens.length){
              cfg._scored = true;
              if(erros>0 && !repeat) logErr(m.code+' — '+m.nome, 'Ordenação das etapas', cfg.licao);
              renderPool();
              document.getElementById('fb').innerHTML =
               '<div class="feedback good"><span class="tag">✔ Sequência completa!</span>'+esc(cfg.licao)+
                '<span class="src">Fonte: MI-mhGAP 2.0 (OPAS/OMS)</span></div>'+
                '<button class="btn" onclick="__next()">Continuar ➜</button>';
              window.__next = function(){ var adv=done; if(!checkRescue(adv)) adv(); };
            } else renderPool();
          } else {
            sndErr();
            erros++; errosSeq++; setCombo(0);
            if(!repeat) setTrust(-6);
            btn.classList.add('shake');
            if(errosSeq>=2){
              errosSeq=0;
              document.getElementById('fb').innerHTML =
               '<div class="feedback bad"><span class="tag">✘ Dois erros seguidos — opções reembaralhadas</span>'+
                'Nada de tentativa e erro: pense no percurso do paciente. O que precisa acontecer <b>antes</b>?</div>';
              setTimeout(renderPool, 350);
            } else {
              setTimeout(function(){btn.classList.remove('shake');}, 350);
              document.getElementById('fb').innerHTML =
               '<div class="feedback bad"><span class="tag">✘ Ainda não é essa</span>'+
                'Pense no percurso: o que precisa acontecer <b>antes</b> desta etapa fazer sentido?</div>';
            }
          }
        };
      })(btns[b]);
    }
  }
  renderPool();
}

/* ---- rodada de recuperação (loop de maestria) ---- */
function recoverRound(){
  if(PEND.length===0){ fimMod(); return; }
  var fila = PEND.slice(); PEND = [];
  MODE = 'recover';
  remember(function(){ MODE='recover'; introRecover(fila); });
  introRecover(fila);
}
function introRecover(fila){
  var m=MODS[S.mod];
  screen.innerHTML =
   '<div class="card center">'+
     navBar({mapa:true})+
     '<span class="phase-badge recover">🔁 Rodada de recuperação</span>'+
     '<h2>Os casos em que você tropeçou voltaram</h2>'+
     '<p style="max-width:540px;margin:10px auto;">Antes da medalha de <b>'+m.nome+'</b>, resolva de novo os '+fila.length+' caso(s) em que errou. Agora valem 50 pontos cada — o que importa é fixar o algoritmo.</p>'+
     '<button class="btn" onclick="__go()">Encarar de novo ➜</button>'+
   '</div>';
  window.__go = function(){
    cenario(shuffle(fila), 0, function(){ MODE='normal'; fimMod(); });
  };
}

/* ---- fim de módulo ---- */
function calcStars(){
  var s = S.ft[S.mod]||{t:0,c:0};
  if(s.t===0) return 1;
  var p = s.c/s.t;
  var base = p>=0.9 ? 3 : (p>=0.65 ? 2 : 1);
  // A 3ª estrela exige ter visto o banco COMPLETO do módulo (garante exposição a todo o conteúdo)
  if(base===3 && !cobertura(S.mod).completo) base = 2;
  return base;
}
function fimMod(){
  S.done[S.mod]=true;
  S.stars[S.mod]=calcStars();
  salvar();
  remember(fimMod);
  var m=MODS[S.mod];
  var todos = nDone()===TOTAL_MODS;
  var st = S.stars[S.mod];
  screen.innerHTML =
   '<div class="card center">'+
     navBar({modulo:true, mapa:true})+
     '<div style="font-size:3rem">'+m.badge.emoji+'</div>'+
     '<h2>Medalha conquistada: '+m.badge.name+'!</h2>'+
     '<p style="font-size:1.4rem; color:var(--amber); letter-spacing:4px;">'+starsHtml(st)+'</p>'+
     '<p class="muted">Módulo '+m.code+' — '+m.nome+' — concluído. '+
       (st===3?'Desempenho impecável na primeira tentativa!':st===2?'Bom desempenho — vale rejogar o módulo em busca das 3 estrelas.':'Módulo fechado na garra — rejogue depois para subir as estrelas.')+'</p>'+
     '<p>Confiança do paciente: <b>'+S.trust+'</b> · Pontos: <b>'+S.score+'</b> · Módulos: <b>'+nDone()+'/'+TOTAL_MODS+'</b></p>'+
     (function(){ var cob = cobertura(S.mod);
        return cob.completo
          ? '<p class="muted">📚 Banco completo: você viu todos os '+cob.t+' casos deste módulo.</p>'
          : '<p class="muted">📚 Você viu <b>'+cob.v+'/'+cob.t+'</b> casos do banco — rejogue o módulo para conhecer os restantes e liberar a 3ª estrela.</p>'; })()+
     (todos && !S.misto
       ? '<button class="btn" onclick="runMisto()">⚡ Plantão misto final ➜</button>'
       : '<button class="btn" onclick="mapaGeral()">Voltar ao Mapa Geral ➜</button>')+
     ' <button class="btn ghost" onclick="ficha('+S.mod+')">📖 Ficha do módulo</button>'+
   '</div>';
  sndBadge(); confete();
}

/* ---- plantão misto final (repetição espaçada + sorteio) ---- */
function poolMisto(){
  var pool = [];
  MODS.forEach(function(m){
    m.acts.forEach(function(a){
      if(a.type==='cenario') a.data.forEach(function(c){
        var cc = {}; for(var k in c) cc[k]=c[k];
        cc._src = m.code;
        pool.push(cc);
      });
    });
  });
  return pool;
}
function runMisto(){
  MODE = 'misto';
  // Repetição espaçada de verdade: casos errados durante o plantão têm prioridade no sorteio
  var pool = poolMisto();
  var erradas = {};
  S.errors.forEach(function(e){ erradas[e.resumo] = true; });
  var errPool = shuffle(pool.filter(function(c){ return erradas[c.q]; }));
  var restPool = shuffle(pool.filter(function(c){ return !erradas[c.q]; }));
  var sel = errPool.slice(0,4);
  sel = shuffle(sel.concat(restPool.slice(0, 6 - sel.length)));
  remember(function(){ MODE='misto'; introMisto(sel); });
  introMisto(sel);
}
function introMisto(sel){
  screen.innerHTML =
   '<div class="card center">'+
     navBar({mapa:true})+
     '<span class="phase-badge misto">⚡ Plantão misto</span>'+
     '<h2>Rodada final: 6 casos-relâmpago</h2>'+
     '<p style="max-width:540px;margin:10px auto;">A sala de espera mistura tudo: os casos vêm <b>sorteados de todos os módulos</b>, sem avisar de qual — e os que você <b>errou durante o plantão têm prioridade</b> no sorteio. É a prova de que o conteúdo ficou.</p>'+
     '<button class="btn" onclick="__go()">Abrir a porta ➜</button>'+
   '</div>';
  window.__go = function(){
    cenario(sel, 0, function(){
      MODE='normal'; S.misto=true; salvar(); telaFinal();
    });
  };
}

/* ---- tela final ---- */
function telaFinal(){
  remember(telaFinal);
  salvar();
  var totalStars = 0; for(var k in S.stars) totalStars += S.stars[k];
  var nota = S.errors.length===0 ? 'Impecável! Você percorreu todos os algoritmos sem tropeços.'
    : S.errors.length<=6 ? 'Excelente plantão — revise os pontos abaixo e estará pronto(a) para a prática.'
    : 'Bom trabalho ao concluir! A lista abaixo mostra exatamente o que reler no manual.';
  var revisao = S.errors.length===0 ? '<p class="muted">Nenhum ponto de revisão — parabéns!</p>'
    : S.errors.map(function(e){return '<div class="review"><b>'+esc(e.fase)+'</b> — '+esc(e.resumo)+'<br>📖 <i>'+esc(e.licao)+'</i></div>';}).join('');
  var badgesHtml = MODS.map(function(m,i){
    return '<div class="badge '+(S.done[i]?'':'off')+'"><div class="emoji">'+m.badge.emoji+'</div><div class="name">'+m.badge.name+'</div>'+
      (S.done[i]?'<div class="stars">'+starsHtml(S.stars[i]||1)+'</div>':'')+'</div>';
  }).join('');
  screen.innerHTML =
   '<div class="card center">'+
     navBar({mapa:true})+
     '<div style="font-size:3rem">🏅</div>'+
     '<h2>Plantão concluído!</h2>'+
     '<div class="score-big">'+S.score+' pts</div>'+
     '<p>Confiança final: <b>'+S.trust+'/100</b> · Estrelas: <b>'+totalStars+'/'+(TOTAL_MODS*3)+'</b> · Módulos: <b>'+nDone()+'/'+TOTAL_MODS+'</b></p>'+
     '<p style="max-width:540px;margin:10px auto;">'+nota+'</p>'+
     '<div class="badges">'+badgesHtml+'</div>'+
     '<h3>📚 Revisão personalizada</h3>'+revisao+
     '<div class="dica" style="text-align:left"><b>Lembretes transversais:</b> em TODO módulo, se houver risco iminente de suicídio, avalie e trate antes de continuar (SUI). Pessoas com transtornos mentais graves têm risco 2–3× maior de morte por doenças evitáveis — monitore sempre a saúde física (PCE).</div>'+
     '<p class="muted">Quer as 27 estrelas? Rejogue os módulos com ★☆☆ — o sorteio do plantão misto também muda a cada partida.</p>'+
     '<button class="btn" onclick="reiniciarJogo()">🔁 Jogar novamente</button> '+
     '<button class="btn ghost" onclick="telaInicial()">Voltar ao início</button>'+
   '</div>';
  confete();
}

migrarLegacy();
if(MUTED){ var _mb=document.getElementById('muteBtn'); if(_mb) _mb.textContent='🔇'; }
/* Leitura em voz alta: esconde o botão se o navegador não suportar
   e interrompe a fala sempre que a tela muda */
(function(){
  var b = document.getElementById('ttsBtn');
  if(!TTS_OK){ if(b) b.style.display='none'; }
  else if(typeof MutationObserver!=='undefined'){
    try{
      new MutationObserver(function(){ pararFala(); })
        .observe(document.getElementById('screen'), {childList:true});
    }catch(e){}
  }
})();
telaPerfis();
</script>
</body>
